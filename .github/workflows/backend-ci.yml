name: Backend CI

on:
  push:
    branches: [ main ]
    paths:
      - 'ecosystem_analyzer/**'
      - 'graph/**'
      - 'parser/**'
      - 'pyproject.toml'
      - 'poetry.lock'
      - '.github/workflows/**'
  pull_request:
    branches: [ main ]
    paths:
      - 'ecosystem_analyzer/**'
      - 'graph/**'
      - 'parser/**'
      - 'pyproject.toml'
      - 'poetry.lock'
      - '.github/workflows/**'

jobs:
  test-and-analyze:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        # Используем стабильную версию; если нужен 3.14 — раскомментируй allow-prereleases
        python-version: ["3.12"]  # или ["3.14"] с allow-prereleases: true ниже

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
        # allow-prereleases: true  # Раскомментируй, если используешь "3.14"

    - name: Install Poetry
      run: |
        curl -sSL https://install.python-poetry.org | python3 -
        echo "$HOME/.local/bin" >> $GITHUB_PATH
        echo "POETRY_NO_INTERACTION=1" >> $GITHUB_ENV

    - name: Configure Poetry
      run: poetry config virtualenvs.create false

    # === УСТАНОВКА ЗАВИСИМОСТЕЙ (без --only, чтобы не было ошибок) ===
    - name: Install dependencies (graph module)
      working-directory: graph
      run: poetry install --no-root

    - name: Install dependencies (parser module)
      working-directory: parser
      run: poetry install --no-root

    - name: Install dependencies (ecosystem_analyzer)
      working-directory: ecosystem_analyzer
      run: poetry install --no-root

    # === ЛИНТИНГ (запуск из корня, чтобы пути работали) ===
    - name: Run Ruff linting
      run: poetry -C graph run ruff check graph/ ecosystem_analyzer/ parser/

    - name: Run Ruff format check
      run: poetry -C graph run ruff format --check graph/ ecosystem_analyzer/ parser/

    # === ТЕСТЫ С ПОКРЫТИЕМ ===
    - name: Run tests with coverage
      working-directory: graph
      run: |
        poetry run pytest \
          --cov=./graph \
          --cov=../ecosystem_analyzer \
          --cov=../parser \
          --cov-report=xml \
          --cov-report=term-missing \
          -v

    # === CODECOV (опционально — для публичных репо токен не нужен) ===
    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v4
      with:
        file: ./graph/coverage.xml
        flags: backend
        name: backend-coverage
        fail_ci_if_error: false
      env:
        CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}  # Добавь в Settings → Secrets для приватных репо

    # === БЕЙДЖ ПОКРЫТИЯ (только для main) ===
    - name: Generate coverage report
      if: github.ref == 'refs/heads/main'
      working-directory: graph
      run: |
        poetry run coverage report -m > coverage_report.txt
        echo "✅ Coverage report generated"
